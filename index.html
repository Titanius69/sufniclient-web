<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SUFNI CLIENT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            font-family: 'Segoe UI', 'IBM Plex Mono', 'Courier New', monospace;
            background: #0a0a0c;
            position: relative;
            color: #e0e0e0;
        }

        /* háttér - letisztult sötét ipari */
        .workshop-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0c0c10;
            z-index: 0;
        }
        .workshop-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(80,80,100,0.05) 0px, rgba(80,80,100,0.05) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(70,70,90,0.03) 0px, rgba(70,70,90,0.03) 1px, transparent 1px, transparent 6px);
            pointer-events: none;
        }

        /* fő tartalom - áttetsző réteg nélkül, tiszta */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0a0a0e;
        }

        /* fejléc - minimal */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 28px 8px 28px;
            border-bottom: 1px solid #2a2a36;
        }
        .title h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #f0f0f0;
            font-family: 'Segoe UI', monospace;
        }
        .title h1 span {
            color: #7a8cff;
            font-weight: 700;
        }
        .badge {
            background: #18181e;
            padding: 4px 12px;
            border-radius: 32px;
            font-size: 10px;
            font-weight: 500;
            font-family: monospace;
            border-left: 3px solid #7a8cff;
            letter-spacing: 0.5px;
            color: #c0c0e0;
        }
        .version-tag {
            font-size: 11px;
            font-family: monospace;
            background: #15151c;
            padding: 4px 12px;
            border-radius: 20px;
            color: #b0b0d0;
            border: 0.5px solid #3a3a50;
        }

        /* progress bar */
        .progress-area {
            margin: 18px 28px 8px 28px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            margin-bottom: 6px;
            color: #b0b0c0;
            letter-spacing: 0.4px;
        }
        .progress-bar-container {
            background: #18181e;
            border-radius: 2px;
            height: 8px;
            overflow: hidden;
            border: 0.5px solid #3a3a50;
            box-shadow: inset 0 1px 3px #00000055;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #7a8cff;
            transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* log terminál - letisztult */
        .log-section {
            margin: 8px 28px 14px 28px;
            flex: 0 0 auto;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .log-header span {
            font-size: 11px;
            font-weight: 500;
            background: #15151c;
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 0.6px;
            color: #c0c0e0;
        }
        .clear-log {
            background: none;
            border: none;
            color: #8a8aa0;
            font-family: monospace;
            font-size: 10px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 16px;
            transition: all 0.1s;
        }
        .clear-log:hover {
            background: #252530;
            color: #e0e0f0;
        }
        .log-box {
            background: #07070a;
            border: 1px solid #2a2a36;
            border-radius: 6px;
            padding: 12px 12px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.45;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }
        .log-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
            color: #d0d0e8;
            border-left: 2px solid transparent;
            padding-left: 8px;
        }
        .log-error {
            color: #ff9fbf;
            border-left-color: #ff6b8b;
        }
        .log-success {
            color: #a5f0c0;
        }
        .log-info {
            color: #b8b8e0;
        }

        /* input mezők */
        .controls {
            display: flex;
            gap: 20px;
            margin: 6px 28px 12px 28px;
        }
        .input-field {
            flex: 1;
        }
        .input-field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9a9ac0;
            margin-bottom: 6px;
        }
        .input-field input {
            width: 100%;
            background: #0e0e14;
            border: 1px solid #3a3a50;
            border-radius: 6px;
            padding: 8px 12px;
            color: #f0f0f0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: 0.1s linear;
        }
        .input-field input:focus {
            border-color: #7a8cff;
            box-shadow: 0 0 0 1px #7a8cff66;
            background: #14141c;
        }

        /* indító gomb */
        .action {
            margin: 8px 28px 12px 28px;
            display: flex;
            justify-content: center;
        }
        .launch-btn {
            background: #18181e;
            border: 1px solid #7a8cff;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #f0f0f0;
            width: 100%;
            max-width: 260px;
            transition: all 0.2s;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 1.5px;
        }
        .launch-btn:hover {
            background: #7a8cff;
            border-color: #a0b0ff;
            color: #0a0a0c;
        }
        .launch-btn:active {
            transform: scale(0.97);
        }
        .launch-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            background: #18181e;
            border-color: #4a4a60;
        }

        .status-area {
            margin: 2px 28px 16px 28px;
            font-size: 10px;
            font-family: monospace;
            background: #0e0e14bb;
            padding: 6px 12px;
            border-radius: 24px;
            text-align: center;
            color: #b0b0d0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .led {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3a3a50;
            box-shadow: 0 0 2px currentColor;
        }
        .led.active {
            background: #7a8cff;
            box-shadow: 0 0 6px #7a8cff;
        }

        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-track {
            background: #18181e;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #5a5a80;
            border-radius: 10px;
        }

        /* nincs részecske, nincs extra effekt */
        #dustCanvas {
            display: none;
        }
        .crt-glow, .scanline {
            display: none;
        }
    </style>
</head>
<body>
<div class="workshop-bg"></div>
<div class="content">
    <div class="header">
        <div class="title">
            <h1>SUFNI <span>//</span> LAUNCHER</h1>
        </div>
        <div class="badge">· fabric ·</div>
        <div class="version-tag">v1.19.4-fabric</div>
    </div>

    <div class="progress-area">
        <div class="progress-label">
            <span>PROGRESS</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <span>⎯ TERMINAL ⎯</span>
            <button class="clear-log" id="clearLogBtn">⌧ clear</button>
        </div>
        <div class="log-box" id="logBox">
        </div>
    </div>

    <div class="controls">
        <div class="input-field">
            <label>⌨️ username</label>
            <input type="text" id="username" spellcheck="false" autocomplete="off">
        </div>
        <div class="input-field">
            <label>🧠 memory (2G / 4G)</label>
            <input type="text" id="memory" value="4G" spellcheck="false" autocomplete="off">
        </div>
    </div>

    <div class="action">
        <button class="launch-btn" id="launchBtn">⏣ LAUNCH ⏣</button>
    </div>

    <div class="status-area">
        <span class="led" id="statusLed"></span>
        <span id="statusText">● ready ●</span>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const launchBtn = document.getElementById('launchBtn');
        const usernameInput = document.getElementById('username');
        const memoryInput = document.getElementById('memory');
        const progressFill = document.getElementById('progressFill');
        const progressPercentSpan = document.getElementById('progressPercent');
        const logBox = document.getElementById('logBox');
        const statusTextSpan = document.getElementById('statusText');
        const statusLed = document.getElementById('statusLed');

        let isLaunching = false;
        let fakeSequenceTimer = null;
        let currentProgress = 0;

        // ----- local storage -----
        function loadStoredSettings() {
            const savedUser = localStorage.getItem('sufni_username');
            const savedMem = localStorage.getItem('sufni_memory');
            if (savedUser) usernameInput.value = savedUser;
            if (savedMem) memoryInput.value = savedMem;
        }
        function saveSettings() {
            localStorage.setItem('sufni_username', usernameInput.value.trim());
            localStorage.setItem('sufni_memory', memoryInput.value.trim());
        }

        // ----- log helper -----
        function addLog(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'log-line';
            if (type === 'error') line.classList.add('log-error');
            else if (type === 'success') line.classList.add('log-success');
            else line.classList.add('log-info');
            
            const timestamp = new Date().toLocaleTimeString('hu-HU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            line.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while(logBox.children.length > 220) logBox.removeChild(logBox.firstChild);
        }

        function clearLog() {
            while(logBox.firstChild) logBox.removeChild(logBox.firstChild);
            addLog('terminal cleared', 'info');
            addLog('sufni launcher ready', 'info');
        }

        function setProgress(percent) {
            let p = Math.min(100, Math.max(0, Math.floor(percent)));
            currentProgress = p;
            progressFill.style.width = p + '%';
            progressPercentSpan.innerText = p + '%';
            if (p === 100) {
                statusTextSpan.innerText = '✓ running ✓';
                statusLed.classList.add('active');
            } else if (p > 0 && p < 100) {
                statusTextSpan.innerText = `⧗ ${p}%`;
                statusLed.classList.add('active');
            } else {
                statusTextSpan.innerText = '● ready ●';
                statusLed.classList.remove('active');
            }
        }

        function resetProgress() {
            setProgress(0);
        }

        // ----- szimuláció (fallback) - nincs időtúllépés ellenőrzés -----
        function simulateLaunch(username, memory) {
            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
            addLog(`launch request: ${username} | ${memory} RAM`, 'info');
            setProgress(5);
            
            const steps = [
                { progress: 12, msg: 'checking user profile ...', delay: 350 },
                { progress: 25, msg: 'loading libraries', delay: 400 },
                { progress: 40, msg: `allocating memory: ${memory}`, delay: 300 },
                { progress: 55, msg: 'initializing native modules (fabric)', delay: 420 },
                { progress: 70, msg: 'integrating game assets', delay: 380 },
                { progress: 85, msg: 'activating launch hooks', delay: 350 },
                { progress: 98, msg: 'render prep', delay: 300 }
            ];
            
            let stepIndex = 0;
            function runStep() {
                if (!isLaunching) return;
                if (stepIndex >= steps.length) {
                    setProgress(100);
                    addLog(`✔️ SUFNI launched (${username} / ${memory})`, 'success');
                    addLog(`game session active`, 'info');
                    statusTextSpan.innerText = '✔️ running ✔️';
                    statusLed.classList.add('active');
                    isLaunching = false;
                    launchBtn.disabled = false;
                    return;
                }
                const step = steps[stepIndex];
                setProgress(step.progress);
                addLog(step.msg, 'info');
                stepIndex++;
                fakeSequenceTimer = setTimeout(runStep, step.delay);
            }
            runStep();
        }

        // ----- webview2 kommunikáció (nincs timeout figyelés) -----
        function setupWebViewListener() {
            if (window.chrome?.webview) {
                window.chrome.webview.addEventListener('message', (event) => {
                    if (!isLaunching) return;
                    const raw = event.data;
                    try {
                        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
                        if (data.type === 'output') {
                            const line = data.line;
                            if (line && line.startsWith('PROGRESS:')) {
                                const perc = parseInt(line.split(':')[1]);
                                if (!isNaN(perc)) setProgress(perc);
                            } else if (line && line.startsWith('LOG:')) {
                                addLog(line.substring(4), 'info');
                            } else if (line) {
                                addLog(line, 'info');
                            }
                        } else if (data.type === 'error') {
                            addLog(data.line || data.message, 'error');
                        } else if (data.type === 'log') {
                            addLog(data.message, 'info');
                        }
                        if (data.type === 'done' || (data.progress && data.progress >= 100)) {
                            setProgress(100);
                            addLog(`launcher success (backend)`, 'success');
                            isLaunching = false;
                            launchBtn.disabled = false;
                            statusLed.classList.add('active');
                            statusTextSpan.innerText = '✔️ running ✔️';
                            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
                        }
                    } catch(e) {
                        addLog(`message parse error: ${raw}`, 'error');
                    }
                });
            }
        }

        // ----- indítás fő függvény - nincs timeout, nincs extra ellenőrzés -----
        function startLaunch() {
            if (isLaunching) {
                addLog('launch already in progress', 'error');
                return;
            }
            const username = usernameInput.value.trim();
            let memory = memoryInput.value.trim().toUpperCase();
            if (!username) {
                addLog('❌ username required', 'error');
                return;
            }
            if (!memory.match(/^\d+G$/)) {
                addLog('❌ memory format: number + G (2G, 4G)', 'error');
                return;
            }
            saveSettings();
            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
            resetProgress();
            addLog(`🚀 LAUNCH: ${username} | mem: ${memory}`, 'info');
            isLaunching = true;
            launchBtn.disabled = true;
            statusLed.classList.remove('active');
            statusTextSpan.innerText = '⏳ launching';
            
            const hasWebView = !!(window.chrome && window.chrome.webview);
            if (hasWebView) {
                const message = {
                    command: 'start',
                    username: username,
                    memory: memory
                };
                window.chrome.webview.postMessage(JSON.stringify(message));
                // NINCS timeout / fallback timer - tiszta, csak backend válaszra vár
                // (ha nem jön válasz, a felhasználó újrapróbálkozhat, de nem állítunk be automatikus időtúllépést)
            } else {
                addLog('ℹ️ WebView2 not available - DEMO mode (simulation)', 'info');
                simulateLaunch(username, memory);
            }
        }

        // ----- force unlock manual -----
        function forceUnlock() {
            if (isLaunching) {
                if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
                isLaunching = false;
                launchBtn.disabled = false;
                addLog('⛔ launch aborted (manual)', 'error');
                setProgress(0);
                statusTextSpan.innerText = '● aborted ●';
                statusLed.classList.remove('active');
            }
        }

        // események
        launchBtn.addEventListener('click', startLaunch);
        document.getElementById('clearLogBtn').addEventListener('click', clearLog);
        
        [usernameInput, memoryInput].forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    startLaunch();
                }
            });
        });

        loadStoredSettings();
        setupWebViewListener();
        statusLed.classList.remove('active');
        
        // nincs időtúllépés ellenőrző setInterval, nincs auto timeout
        // minden felesleges effekt / háttér / részecske / crt eltávolítva
    })();
</script>
</body>
</html>

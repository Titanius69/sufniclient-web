<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufni Launcher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            color: #ffaa44;
        }
        button {
            background: #ffaa44;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Sufni Launcher</h1>
        <p>Üdvözlünk a launcher GUI-ban!</p>
        <button id="playBtn">▶ Játék indítása</button>
        <button id="settingsBtn">⚙ Beállítások</button>
        <div class="status" id="statusText">Készen áll</div>
    </div>
    <script>
        document.getElementById('playBtn').addEventListener('click', () => {
            document.getElementById('statusText').innerText = 'Indítás...';
        });
        document.getElementById('settingsBtn').addEventListener('click', () => {
            alert('Beállítások – később bővíthető');
        });
    </script>
</body>
</html>

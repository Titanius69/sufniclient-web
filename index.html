<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufni Launcher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            color: #ffaa44;
        }
        .input-group {
            margin: 15px 0;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: #fff;
        }
        button {
            background: #ffaa44;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Sufni Launcher</h1>
        <div class="input-group">
            <label>Felhasználónév:</label>
            <input type="text" id="username" value="Titanius">
        </div>
        <div class="input-group">
            <label>Memória (pl. 2G, 4G):</label>
            <input type="text" id="memory" value="2G">
        </div>
        <button id="launchBtn">🚀 Játék indítása</button>
        <div class="status" id="statusText">Készen áll</div>
    </div>
    <script>
        const launchBtn = document.getElementById('launchBtn');
        const usernameInput = document.getElementById('username');
        const memoryInput = document.getElementById('memory');
        const statusDiv = document.getElementById('statusText');

        launchBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const memory = memoryInput.value.trim();
            if (!username) {
                statusDiv.innerText = 'Kérlek add meg a felhasználónevet!';
                return;
            }
            if (!memory || !/^\d+[Gg]$/.test(memory)) {
                statusDiv.innerText = 'A memória formátuma: pl. 2G, 4G';
                return;
            }
            statusDiv.innerText = 'Indítás...';
            // Üzenet küldése a C# alkalmazásnak
            const message = {
                username: username,
                memory: memory.toUpperCase()
            };
            window.chrome.webview.postMessage(JSON.stringify(message));
        });
    </script>
</body>
</html>

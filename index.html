<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sufni Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            background: #0a041a;
            position: relative;
            color: #e9e2ff;
        }
        .space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #2a1548 0%, #0b0420 100%);
            z-index: 0;
        }
        .space-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(139, 92, 246, 0.2), transparent 70%);
            pointer-events: none;
        }
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(3px);
            background: radial-gradient(circle at 20% 30%, rgba(20, 8, 45, 0.6), rgba(5, 2, 15, 0.85));
        }
        .version {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 12px;
            font-family: monospace;
            color: rgba(200, 150, 255, 0.8);
            letter-spacing: 1px;
            background: rgba(30, 15, 60, 0.6);
            padding: 3px 12px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            z-index: 3;
            border: 1px solid rgba(168, 85, 247, 0.3);
            font-weight: 500;
        }
        .title {
            text-align: center;
            margin-top: 45px;
            margin-bottom: 12px;
        }
        .title h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
            letter-spacing: 3px;
        }
        .title p {
            font-size: 11px;
            color: #b9a9f0;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .progress-container {
            margin: 12px 35px 10px 35px;
            background: #1f142f;
            border-radius: 40px;
            height: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px #00000066, 0 0 8px #a855f744;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b77eff, #9333ea, #7c3aed);
            border-radius: 40px;
            transition: width 0.2s ease;
            box-shadow: 0 0 8px #c084fc;
        }
        .log-box {
            margin: 5px 35px 18px 35px;
            background: rgba(18, 8, 35, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 14px;
            height: 210px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 11px;
            border: 1px solid rgba(168, 85, 247, 0.35);
            box-shadow: inset 0 0 18px rgba(0,0,0,0.6), 0 0 12px rgba(139, 92, 246, 0.2);
        }
        .log-line {
            margin: 5px 0;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.35;
            color: #ddd6fe;
        }
        .log-error {
            color: #ffa7c4;
            text-shadow: 0 0 4px #d946ef80;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            margin: 8px 35px 12px 35px;
        }
        .input-group {
            flex: 1;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 6px;
            color: #d8b4fe;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #a855f788;
            border-radius: 60px;
            padding: 9px 16px;
            color: #f0eaff;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            font-family: monospace;
        }
        .input-group input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px #c084fc;
            background: #140b25;
        }
        .launch-btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 8px 35px 18px 35px;
        }
        button {
            background: linear-gradient(95deg, #a855f7, #7c3aed);
            border: none;
            padding: 10px 32px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 80px;
            cursor: pointer;
            color: #f3e8ff;
            width: 75%;
            max-width: 280px;
            transition: all 0.25s;
            box-shadow: 0 0 16px #a855f7aa;
            letter-spacing: 2px;
            font-family: inherit;
            text-shadow: 0 0 2px #00000055;
        }
        button:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #c084fc, #9333ea);
            box-shadow: 0 0 24px #c084fc;
            color: #ffffff;
        }
        button:active {
            transform: scale(0.97);
        }
        .status {
            text-align: center;
            font-size: 11px;
            margin: 0px 35px 15px 35px;
            color: #c9b3ff;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 60px;
            width: auto;
        }
        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-track {
            background: #2a1b3e;
            border-radius: 10px;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="space-bg"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="content">
        <div class="version">1.19.4</div>
        <div class="title">
            <h1>SUFNI LAUNCHER</h1>
            <p>fabric edition</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="log-box" id="logBox">
            <div class="log-line">⛭ rendszer indul ...</div>
            <div class="log-line">🌌 készen áll a mélység</div>
        </div>

        <div class="control-row">
            <div class="input-group">
                <label>🌀 FELHASZNÁLÓNÉV</label>
                <input type="text" id="username" value="Titanius" spellcheck="false">
            </div>
            <div class="input-group">
                <label>💾 MEMÓRIA (pl. 2G, 4G)</label>
                <input type="text" id="memory" value="2G" spellcheck="false">
            </div>
        </div>

        <div class="launch-btn-wrapper">
            <button id="launchBtn">▷ INDÍTÁS ◁</button>
        </div>
        <div class="status" id="statusText">● készen áll ●</div>
    </div>

    <script>
        (function() {
            const launchBtn = document.getElementById('launchBtn');
            const usernameInput = document.getElementById('username');
            const memoryInput = document.getElementById('memory');
            const progressBar = document.getElementById('progressBar');
            const logBox = document.getElementById('logBox');
            const statusDiv = document.getElementById('statusText');

            function addLog(message, isError = false) {
                const line = document.createElement('div');
                line.className = 'log-line' + (isError ? ' log-error' : '');
                const timestamp = new Date().toLocaleTimeString('hu-HU', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
                line.textContent = `[${timestamp}] ${message}`;
                logBox.appendChild(line);
                line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function setProgress(percent) {
                let p = Math.min(100, Math.max(0, percent));
                progressBar.style.width = p + '%';
                statusDiv.textContent = `folyamat: ${p}%`;
                if (p === 100) statusDiv.textContent = `✔️ kész ✔️`;
            }

            if (window.chrome?.webview) {
                window.chrome.webview.addEventListener('message', (event) => {
                    const data = event.data;
                    if (typeof data === 'string') {
                        try {
                            const parsed = JSON.parse(data);
                            if (parsed.type === 'output') {
                                const line = parsed.line;
                                if (line.startsWith('PROGRESS:')) {
                                    const parts = line.split(':');
                                    if (parts.length >= 2) {
                                        const percent = parseInt(parts[1]);
                                        if (!isNaN(percent)) setProgress(percent);
                                    }
                                } else if (line.startsWith('LOG:')) {
                                    addLog(line.substring(4));
                                } else {
                                    addLog(line);
                                }
                            } else if (parsed.type === 'error') {
                                addLog(parsed.line, true);
                            } else if (parsed.type === 'log') {
                                addLog(parsed.message);
                            }
                        } catch(e) {
                            addLog(data, false);
                        }
                    }
                });
            }

            launchBtn.addEventListener('click', () => {
                const username = usernameInput.value.trim();
                let memory = memoryInput.value.trim();
                if (!username) {
                    addLog('❌ Kérlek add meg a felhasználónevet!', true);
                    return;
                }
                if (!memory || !/^\d+[Gg]$/.test(memory)) {
                    addLog('❌ A memória formátuma: pl. 2G, 4G', true);
                    return;
                }
                memory = memory.toUpperCase();
                addLog(`🚀 Indítás kérése elküldve (${username} / ${memory})`);
                setProgress(0);
                const message = {
                    command: 'start',
                    username: username,
                    memory: memory
                };
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(JSON.stringify(message));
                } else {
                    addLog('⚠️ WebView2 környezet nem aktív (tesztüzem)', false);
                    setProgress(35);
                    setTimeout(() => setProgress(70), 500);
                    setTimeout(() => {
                        setProgress(100);
                        addLog('✨ [DEMO] Az indítás megtörtént (fő rendszer offline)', false);
                    }, 1200);
                }
            });

            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 170;

            function resizeCanvas() {
                canvas.width = 800;
                canvas.height = 600;
            }
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.4 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.22;
                    this.speedY = (Math.random() - 0.5) * 0.12;
                    this.alpha = Math.random() * 0.65 + 0.2;
                    const purpleHues = [180, 150, 210, 170, 190];
                    const base = purpleHues[Math.floor(Math.random() * purpleHues.length)];
                    this.color = `rgba(${base + 40}, ${base}, 255, ${this.alpha})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    if (this.size > 1.5) {
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = "#c084fc";
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();

            window.addEventListener('resize', () => {
                if (canvas.width !== 800 || canvas.height !== 600) {
                    resizeCanvas();
                    initParticles();
                }
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sufni Launcher - Void Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; 
        }

        body {
            width: 600px;
            height: 600px;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            background: #000000;
            position: relative;
            color: #e0e0e0;
        }

        .space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://github.com/Titanius69/sufniclient-web/blob/main/void-43c06nbtet1g0ww7.jpg?raw=true');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.2);
            z-index: 0;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.65), rgba(0,0,0,0.85));
        }

        /* Verzió bal felső sarokban */
        .version {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 13px;
            font-family: monospace;
            color: rgba(255, 200, 100, 0.55);
            letter-spacing: 1px;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            z-index: 3;
        }

        .title {
            text-align: center;
            margin-top: 45px;
            margin-bottom: 10px;
        }
        .title h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255,170,68,0.3);
            letter-spacing: 2px;
        }
        .title p {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
        }

        /* Progress bar */
        .progress-container {
            margin: 15px 30px 10px 30px;
            background: #1e1e2e;
            border-radius: 40px;
            height: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #00000055, 0 0 5px #ffaa4433;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa44, #ff6622);
            border-radius: 40px;
            transition: width 0.2s ease;
            box-shadow: 0 0 6px #ffaa44;
        }

        .log-box {
            margin: 5px 30px 15px 30px;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 18px;
            padding: 12px;
            height: 220px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 11px;
            border: 1px solid rgba(255,170,68,0.2);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 0 10px rgba(0,0,0,0.3);
        }
        .log-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.3;
            color: #ccc;
        }
        .log-error {
            color: #ff8888;
            text-shadow: 0 0 3px #ff0000aa;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 8px 30px 10px 30px;
        }
        .input-group {
            flex: 1;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 5px;
            color: #ffaa88;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa4455;
            border-radius: 40px;
            padding: 8px 14px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            font-family: monospace;
        }
        .input-group input:focus {
            border-color: #ffaa44;
            box-shadow: 0 0 8px #ffaa44;
            background: #000000aa;
        }

        .launch-btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 5px 30px 20px 30px;
        }
        button {
            background: linear-gradient(95deg, #ffaa44, #ff7711);
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            color: #111;
            width: 80%;
            max-width: 260px;
            transition: all 0.25s;
            box-shadow: 0 0 12px #ffaa44aa;
            letter-spacing: 2px;
            font-family: inherit;
        }
        button:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ffbb55, #ff8822);
            box-shadow: 0 0 18px #ffaa44;
            color: #000;
        }
        button:active {
            transform: scale(0.98);
        }

        .status {
            text-align: center;
            font-size: 11px;
            margin: 5px 30px 0 30px;
            color: #ffaa66aa;
            font-family: monospace;
        }

        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-track {
            background: #1e1e2e;
            border-radius: 10px;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="space-bg"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="content">
        <div class="version">⚡ 1.19.4</div>
        <div class="title">
            <h1>SUFNI LAUNCHER</h1>
            <p>void fabric edition</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="log-box" id="logBox">
            <div class="log-line">⛭  rendszer indul ...</div>
            <div class="log-line">🌌  készen áll a mélység</div>
        </div>

        <div class="control-row">
            <div class="input-group">
                <label>🌀 FELHASZNÁLÓNÉV</label>
                <input type="text" id="username" value="Titanius" spellcheck="false">
            </div>
            <div class="input-group">
                <label>💾 MEMÓRIA (pl. 2G, 4G)</label>
                <input type="text" id="memory" value="2G" spellcheck="false">
            </div>
        </div>

        <div class="launch-btn-wrapper">
            <button id="launchBtn">▷  INDÍTÁS  ◁</button>
        </div>
        <div class="status" id="statusText">●  készen áll  ●</div>
    </div>

    <script>
        (function() {
            const launchBtn = document.getElementById('launchBtn');
            const usernameInput = document.getElementById('username');
            const memoryInput = document.getElementById('memory');
            const progressBar = document.getElementById('progressBar');
            const logBox = document.getElementById('logBox');
            const statusDiv = document.getElementById('statusText');

            function addLog(message, isError = false) {
                const line = document.createElement('div');
                line.className = 'log-line' + (isError ? ' log-error' : '');
                const timestamp = new Date().toLocaleTimeString('hu-HU', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
                line.textContent = `[${timestamp}] ${message}`;
                logBox.appendChild(line);
                line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            }

            function setProgress(percent) {
                let p = Math.min(100, Math.max(0, percent));
                progressBar.style.width = p + '%';
                statusDiv.textContent = `⚡ folyamat: ${p}% ⚡`;
                if (p === 100) statusDiv.textContent = `✔️ kész ✔️`;
            }


            window.chrome.webview.addEventListener('message', (event) => {
                const data = event.data;
                if (typeof data === 'string') {
                    try {
                        const parsed = JSON.parse(data);
                        if (parsed.type === 'output') {
                            const line = parsed.line;
                            if (line.startsWith('PROGRESS:')) {
                                const parts = line.split(':');
                                if (parts.length >= 2) {
                                    const percent = parseInt(parts[1]);
                                    if (!isNaN(percent)) setProgress(percent);
                                }
                            } else if (line.startsWith('LOG:')) {
                                addLog(line.substring(4));
                            } else {
                                addLog(line);
                            }
                        } else if (parsed.type === 'error') {
                            addLog(parsed.line, true);
                        } else if (parsed.type === 'log') {
                            addLog(parsed.message);
                        }
                    } catch(e) {
                        addLog(data, false);
                    }
                }
            });

            // ---- Indítás gomb esemény ----
            launchBtn.addEventListener('click', () => {
                const username = usernameInput.value.trim();
                let memory = memoryInput.value.trim();
                if (!username) {
                    addLog('❌ Kérlek add meg a felhasználónevet!', true);
                    return;
                }
                if (!memory || !/^\d+[Gg]$/.test(memory)) {
                    addLog('❌ A memória formátuma: pl. 2G, 4G', true);
                    return;
                }
                memory = memory.toUpperCase();
                addLog(`🚀 Indítás kérése elküldve (${username} / ${memory})`);
                setProgress(0);
                const message = {
                    command: 'start',
                    username: username,
                    memory: memory
                };
                window.chrome.webview.postMessage(JSON.stringify(message));
            });

            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 130;

            function resizeCanvas() {
                canvas.width = 600;
                canvas.height = 600;
            }
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.2 + 0.6;
                    this.speedX = (Math.random() - 0.5) * 0.25;
                    this.speedY = (Math.random() - 0.5) * 0.15;
                    this.alpha = Math.random() * 0.6 + 0.2;
                    this.color = `rgba(255, 200, 120, ${this.alpha})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            function initParticles() {
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();


            window.addEventListener('resize', () => {
            });
        })();
    </script>
</body>
</html>

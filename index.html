<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SUFNI CLIENT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            font-family: 'Segoe UI', 'IBM Plex Mono', 'Courier New', monospace;
            background: #0b041a;
            position: relative;
            color: #e2d9ff;
        }

        /* --- LILA VOID háttér --- */
        .void-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 40%, #1a0a3a 0%, #03000a 70%, #000000 100%);
            z-index: 0;
        }
        .void-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(160, 100, 255, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(200, 130, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px, 60px 60px;
            pointer-events: none;
        }
        .void-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 60% 80%, rgba(139, 92, 246, 0.25), transparent 70%);
            pointer-events: none;
        }

        /* --- CRT utóhatás --- */
        .crt-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            box-shadow: inset 0 0 18px rgba(0,0,0,0.5), inset 0 0 2px rgba(168, 85, 247, 0.25);
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 3;
        }

        /* --- fő tartalom --- */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(5, 2, 18, 0.75);
            backdrop-filter: blur(3px);
        }

        /* --- fejléc (purple edge) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 28px 8px 28px;
            border-bottom: 1px solid #5a3a9e;
        }
        .title h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #f0eaff;
            text-shadow: 0 0 8px #a855f7, 0 1px 0 #a855f722;
            font-family: 'Segoe UI', 'Orbitron', monospace;
        }
        .title h1 span {
            color: #c084fc;
            font-weight: 700;
            text-shadow: 0 0 5px #a855f7;
        }
        .badge {
            background: rgba(31, 26, 48, 0.8);
            padding: 4px 12px;
            border-radius: 32px;
            font-size: 10px;
            font-weight: 500;
            font-family: monospace;
            border-left: 3px solid #c084fc;
            letter-spacing: 0.5px;
            color: #d6c8ff;
            backdrop-filter: blur(2px);
        }
        .version-tag {
            font-size: 11px;
            font-family: monospace;
            background: rgba(26, 20, 43, 0.8);
            padding: 4px 12px;
            border-radius: 20px;
            color: #d6c8ff;
            border: 0.5px solid #8b5cf6;
        }

        /* --- progress bar (lila acél) --- */
        .progress-area {
            margin: 18px 28px 8px 28px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            margin-bottom: 6px;
            color: #cbbef5;
            letter-spacing: 0.4px;
        }
        .progress-bar-container {
            background: #0a0618;
            border-radius: 2px;
            height: 8px;
            overflow: hidden;
            border: 0.5px solid #7c5acf;
            box-shadow: inset 0 1px 3px #00000055, 0 0 4px rgba(139, 92, 246, 0.3);
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #d946ef, #c084fc);
            box-shadow: 0 0 10px #c084fc;
            transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* --- log terminál (purple gloomy) --- */
        .log-section {
            margin: 8px 28px 14px 28px;
            flex: 0 0 auto;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .log-header span {
            font-size: 11px;
            font-weight: 500;
            background: rgba(31, 26, 48, 0.8);
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 0.6px;
            color: #d6c8ff;
        }
        .clear-log {
            background: none;
            border: none;
            color: #a58ed9;
            font-family: monospace;
            font-size: 10px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 16px;
            transition: all 0.1s;
        }
        .clear-log:hover {
            background: #342a52;
            color: #e2d0ff;
        }
        .log-box {
            background: rgba(6, 3, 14, 0.9);
            border: 1px solid #5e3eae;
            border-radius: 6px;
            padding: 12px 12px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.45;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6), 0 0 8px rgba(139, 92, 246, 0.15);
        }
        .log-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
            color: #e2d9ff;
            border-left: 2px solid transparent;
            padding-left: 8px;
        }
        .log-error {
            color: #f0a6c9;
            border-left-color: #f472b6;
            text-shadow: 0 0 2px #ff00aa33;
        }
        .log-success {
            color: #b9f5c0;
            border-left-color: #4ade80;
        }
        .log-info {
            color: #cbbef5;
        }

        /* --- input mezők (purple industrial) --- */
        .controls {
            display: flex;
            gap: 20px;
            margin: 6px 28px 12px 28px;
        }
        .input-field {
            flex: 1;
        }
        .input-field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cbbef5;
            margin-bottom: 6px;
        }
        .input-field input {
            width: 100%;
            background: rgba(8, 4, 20, 0.9);
            border: 1px solid #6b4bc0;
            border-radius: 6px;
            padding: 8px 12px;
            color: #f0eaff;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: 0.1s linear;
        }
        .input-field input:focus {
            border-color: #d946ef;
            box-shadow: 0 0 0 1px #c084fc66, 0 0 8px #a855f7;
            background: #120b26;
        }

        /* --- indító gomb (purple edge) --- */
        .action {
            margin: 8px 28px 12px 28px;
            display: flex;
            justify-content: center;
        }
        .launch-btn {
            background: rgba(31, 26, 51, 0.9);
            border: 1px solid #b77eff;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #f0e9ff;
            width: 100%;
            max-width: 260px;
            transition: all 0.2s;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 1.5px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 6px rgba(168, 85, 247, 0.3);
        }
        .launch-btn:hover {
            background: #a855f7;
            border-color: #e9b4ff;
            color: #0c0a18;
            box-shadow: 0 0 20px #c084fc;
        }
        .launch-btn:active {
            transform: scale(0.97);
        }
        .launch-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            background: #1f1a33;
            border-color: #5a4790;
            box-shadow: none;
        }

        .status-area {
            margin: 2px 28px 16px 28px;
            font-size: 10px;
            font-family: monospace;
            background: rgba(17, 12, 28, 0.85);
            padding: 6px 12px;
            border-radius: 24px;
            text-align: center;
            color: #d6c8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(2px);
            border: 0.5px solid #4a3a70;
        }
        .led {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3a2e5a;
            box-shadow: 0 0 2px currentColor;
        }
        .led.active {
            background: #c084fc;
            box-shadow: 0 0 8px #d946ef, 0 0 12px #a855f7;
        }

        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-track {
            background: #1c1630;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #a47eff;
            border-radius: 10px;
        }

        /* --- particle canvas (lila csillagpor) --- */
        #voidCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
<div class="void-bg"></div>
<canvas id="voidCanvas"></canvas>
<div class="crt-glow"></div>
<div class="scanline"></div>

<div class="content">
    <div class="header">
        <div class="title">
            <h1>SUFNI <span>//</span> LAUNCHER</h1>
        </div>
            <div class="badge"> · fabric · </div>
        <div class="version-tag">v1.19.4-fabric</div>
    </div>

    <div class="progress-area">
        <div class="progress-label">
            <span>PROGRESS BAR</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <span>⎯ TERMINÁL ⎯</span>
            <button class="clear-log" id="clearLogBtn">⌧ törlés</button>
        </div>
        <div class="log-box" id="logBox">
        </div>
    </div>

    <div class="controls">
        <div class="input-field">
            <label>⌨️ név</label>
            <input type="text" id="username" spellcheck="false" autocomplete="off">
        </div>
        <div class="input-field">
            <label>🧠 memória (pl 2G / 4G)</label>
            <input type="text" id="memory" value="4G" spellcheck="false" autocomplete="off">
        </div>
    </div>

    <div class="action">
        <button class="launch-btn" id="launchBtn">⏣ INDÍTÁS ⏣</button>
    </div>

    <div class="status-area">
        <span class="led" id="statusLed"></span>
        <span id="statusText">● kész ●</span>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const launchBtn = document.getElementById('launchBtn');
        const usernameInput = document.getElementById('username');
        const memoryInput = document.getElementById('memory');
        const progressFill = document.getElementById('progressFill');
        const progressPercentSpan = document.getElementById('progressPercent');
        const logBox = document.getElementById('logBox');
        const statusTextSpan = document.getElementById('statusText');
        const statusLed = document.getElementById('statusLed');

        let isLaunching = false;
        let fakeSequenceTimer = null;
        let currentProgress = 0;
        let launchStartTime = null;

        // ----- local storage -----
        function loadStoredSettings() {
            const savedUser = localStorage.getItem('sufni_username');
            const savedMem = localStorage.getItem('sufni_memory');
            if (savedUser) usernameInput.value = savedUser;
            if (savedMem) memoryInput.value = savedMem;
        }
        function saveSettings() {
            localStorage.setItem('sufni_username', usernameInput.value.trim());
            localStorage.setItem('sufni_memory', memoryInput.value.trim());
        }

        // ----- log helper -----
        function addLog(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'log-line';
            if (type === 'error') line.classList.add('log-error');
            else if (type === 'success') line.classList.add('log-success');
            else if (type === 'info') line.classList.add('log-info');
            
            const timestamp = new Date().toLocaleTimeString('hu-HU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            line.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while(logBox.children.length > 220) logBox.removeChild(logBox.firstChild);
        }

        function clearLog() {
            while(logBox.firstChild) logBox.removeChild(logBox.firstChild);
            addLog('terminál törölve', 'info');
            addLog('sufni launcher újraindításra kész', 'info');
        }

        function setProgress(percent) {
            let p = Math.min(100, Math.max(0, Math.floor(percent)));
            currentProgress = p;
            progressFill.style.width = p + '%';
            progressPercentSpan.innerText = p + '%';
            if (p === 100) {
                statusTextSpan.innerText = '● kész ●';
                statusLed.classList.add('active');
            } else {
                statusTextSpan.innerText = `⧗ folyamat: ${p}%`;
                if(p > 0 && p < 100) statusLed.classList.add('active');
                else if(p === 0) statusLed.classList.remove('active');
            }
        }

        function resetProgress() {
            setProgress(0);
        }

        // ----- szimuláció (offline / fallback) -----
        function simulateLaunch(username, memory) {
            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
            addLog(`⛏ indítás kérés: ${username} | ${memory} RAM`, 'info');
            setProgress(5);
            
            const steps = [
                { progress: 12, msg: '⎯ felhasználói profil ellenőrzése ...', delay: 380 },
                { progress: 25, msg: '⎯ könyvtárak feloldása (libraries)', delay: 420 },
                { progress: 40, msg: `⎯ memória foglalás: ${memory}`, delay: 300 },
                { progress: 55, msg: '⎯ natív modulok betöltése (fabric)', delay: 450 },
                { progress: 70, msg: '⎯ játékösszetevők integrálása', delay: 400 },
                { progress: 85, msg: '⎯ indítási hookok aktiválása', delay: 380 },
                { progress: 98, msg: '⎯ render előkészítés', delay: 350 }
            ];
            
            let stepIndex = 0;
            function runStep() {
                if (!isLaunching) return;
                if (stepIndex >= steps.length) {
                    setProgress(100);
                    addLog(`✔️ SUFNI elindult (${username} / ${memory})`, 'success');
                    addLog(`🌌  műhely mód: játék fut a háttérben`, 'info');
                    statusTextSpan.innerText = '● kész ●';
                    statusLed.classList.add('active');
                    isLaunching = false;
                    launchBtn.disabled = false;
                    return;
                }
                const step = steps[stepIndex];
                setProgress(step.progress);
                addLog(step.msg, 'info');
                stepIndex++;
                fakeSequenceTimer = setTimeout(runStep, step.delay);
            }
            runStep();
        }

        // ----- webview2 kommunikáció -----
        function setupWebViewListener() {
            if (window.chrome?.webview) {
                window.chrome.webview.addEventListener('message', (event) => {
                    if (!isLaunching) return;
                    const raw = event.data;
                    try {
                        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
                        if (data.type === 'output') {
                            const line = data.line;
                            if (line && line.startsWith('PROGRESS:')) {
                                const perc = parseInt(line.split(':')[1]);
                                if (!isNaN(perc)) setProgress(perc);
                            } else if (line && line.startsWith('LOG:')) {
                                addLog(line.substring(4), 'info');
                            } else if (line) {
                                addLog(line, 'info');
                            }
                        } else if (data.type === 'error') {
                            addLog(data.line || data.message, 'error');
                        } else if (data.type === 'log') {
                            addLog(data.message, 'info');
                        }
                        if (data.type === 'done' || (data.progress && data.progress >= 100)) {
                            setProgress(100);
                            addLog(`✔️ Launcher sikeres (backend)`, 'success');
                            isLaunching = false;
                            launchBtn.disabled = false;
                            statusLed.classList.add('active');
                            statusTextSpan.innerText = '● kész ●';
                            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
                        }
                    } catch(e) {
                        addLog(`üzenet feldolgozás hiba: ${raw}`, 'error');
                    }
                });
            }
        }

        // ----- indítás fő függvény -----
        function startLaunch() {
            if (isLaunching) {
                addLog('Már fut egy indítás, várj!', 'error');
                return;
            }
            const username = usernameInput.value.trim();
            let memory = memoryInput.value.trim().toUpperCase();
            if (!username) {
                addLog('❌ Név megadása kötelező', 'error');
                return;
            }
            if (!memory.match(/^\d+G$/)) {
                addLog('❌ Memória formátuma: szám + G (pl 2G, 4G)', 'error');
                return;
            }
            saveSettings();
            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
            resetProgress();
            addLog(`🚀 INDÍTÁS: ${username} | memória: ${memory}`, 'info');
            isLaunching = true;
            launchBtn.disabled = true;
            statusLed.classList.remove('active');
            statusTextSpan.innerText = '⏳ indítás folyamatban';
            launchStartTime = Date.now();
            
            const hasWebView = !!(window.chrome && window.chrome.webview);
            if (hasWebView) {
                const message = {
                    command: 'start',
                    username: username,
                    memory: memory
                };
                window.chrome.webview.postMessage(JSON.stringify(message));
                // timeout 7 sec -> fallback ha nem jön válasz
                let fallbackTimer = setTimeout(() => {
                    if (isLaunching === true && currentProgress === 0) {
                        addLog('⚠️ WebView2 nem válaszol – átváltás szimulációs módra', 'error');
                        simulateLaunch(username, memory);
                        clearTimeout(fallbackTimer);
                    }
                }, 7000);
                const interval = setInterval(() => {
                    if (!isLaunching) {
                        clearInterval(interval);
                        clearTimeout(fallbackTimer);
                    }
                }, 300);
            } else {
                addLog('ℹ️ WebView2 nem elérhető – DEMO mód (szimuláció)', 'info');
                simulateLaunch(username, memory);
            }
        }

        // ----- vészhelyzeti feloldás -----
        function forceUnlock() {
            if (isLaunching) {
                if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
                isLaunching = false;
                launchBtn.disabled = false;
                addLog('⛔ folyamat megszakítva (manuális)', 'error');
                setProgress(0);
                statusTextSpan.innerText = '● kész ●';
                statusLed.classList.remove('active');
            }
        }

        // ----- időtúllépés ellenőrzés -----
        setInterval(() => {
            if (isLaunching && launchStartTime && (Date.now() - launchStartTime > 28000)) {
                addLog('⚠️ időtúllépés, indítás megszakítva', 'error');
                forceUnlock();
                setProgress(0);
            }
        }, 1000);

        // === LILA VOID RÉSZECSKÉK (szebb, mint a por, űrhatás) ===
        const canvas = document.getElementById('voidCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 160;

        function resizeCanvas() {
            canvas.width = 800;
            canvas.height = 600;
        }
        
        class VoidParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.4;
                this.speedX = (Math.random() - 0.5) * 0.12;
                this.speedY = (Math.random() - 0.5) * 0.08;
                // lila, pink, ibolya skála
                const purpleHue = 260 + Math.random() * 40; // 260-300
                const sat = 60 + Math.random() * 35;
                const lit = 50 + Math.random() * 35;
                this.color = `hsla(${purpleHue}, ${sat}%, ${lit}%, ${Math.random() * 0.5 + 0.2})`;
                this.glow = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < -20) this.x = canvas.width + 15;
                if (this.x > canvas.width + 20) this.x = -20;
                if (this.y < -20) this.y = canvas.height + 15;
                if (this.y > canvas.height + 20) this.y = -20;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.glow * 4;
                ctx.shadowColor = '#c084fc';
                ctx.fill();
            }
        }

        // nagyobb, laza csillagok / glóriák
        let starLights = [];
        const STAR_COUNT = 40;
        
        class StarLight {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 1.2 + 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.twinkleSpeed = 0.005 + Math.random() * 0.01;
                this.phase = Math.random() * Math.PI * 2;
            }
            update(time) {
                this.opacity = 0.3 + Math.sin(time * this.twinkleSpeed + this.phase) * 0.2;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 160, 255, ${this.opacity})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#b77eff';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new VoidParticle());
            starLights = [];
            for (let i = 0; i < STAR_COUNT; i++) starLights.push(new StarLight());
        }

        let animationTime = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0;
            // csillagok (háttérben pislákoló)
            for (let s of starLights) {
                s.update(animationTime);
                s.draw();
            }
            // lebegő lila részecskék
            for (let p of particles) {
                p.update();
                p.draw();
            }
            animationTime += 0.016;
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        initParticles();
        animate();
        window.addEventListener('resize', () => {
            if (canvas.width !== 800 || canvas.height !== 600) {
                resizeCanvas();
                initParticles();
            }
        });

        // ----- események -----
        launchBtn.addEventListener('click', startLaunch);
        document.getElementById('clearLogBtn').addEventListener('click', clearLog);
        
        [usernameInput, memoryInput].forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    startLaunch();
                }
            });
        });

        loadStoredSettings();
        setupWebViewListener();
        statusLed.classList.remove('active');
        statusTextSpan.innerText = '● kész ●';
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufni Launcher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            color: #ffaa44;
        }
        .input-group {
            margin: 15px 0;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: #fff;
        }
        button {
            background: #ffaa44;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }
        .progress-container {
            margin-top: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 20px;
            background: #ffaa44;
            transition: width 0.3s;
        }
        .log-box {
            margin-top: 20px;
            background: #1e1e2f;
            border-radius: 10px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
        }
        .log-line {
            margin: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-error {
            color: #ff6666;
        }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Sufni Launcher</h1>
        <div class="input-group">
            <label>Felhasználónév:</label>
            <input type="text" id="username" value="Titanius">
        </div>
        <div class="input-group">
            <label>Memória (pl. 2G, 4G):</label>
            <input type="text" id="memory" value="2G">
        </div>
        <button id="launchBtn">🚀 Játék indítása</button>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="log-box" id="logBox">
            <div class="log-line">Készen áll.</div>
        </div>
        <div class="status" id="statusText"></div>
    </div>
    <script>
        const launchBtn = document.getElementById('launchBtn');
        const usernameInput = document.getElementById('username');
        const memoryInput = document.getElementById('memory');
        const progressBar = document.getElementById('progressBar');
        const logBox = document.getElementById('logBox');
        const statusDiv = document.getElementById('statusText');

        function addLog(message, isError = false) {
            const line = document.createElement('div');
            line.className = 'log-line' + (isError ? ' log-error' : '');
            line.textContent = message;
            logBox.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function setProgress(percent) {
            progressBar.style.width = percent + '%';
            statusDiv.textContent = `Folyamat: ${percent}%`;
        }

        window.chrome.webview.addEventListener('message', (event) => {
            const data = event.data;
            if (typeof data === 'string') {
                try {
                    const parsed = JSON.parse(data);
                    if (parsed.type === 'output') {
                        const line = parsed.line;
                        if (line.startsWith('PROGRESS:')) {
                            const parts = line.split(':');
                            if (parts.length >= 2) {
                                const percent = parseInt(parts[1]);
                                if (!isNaN(percent)) setProgress(percent);
                            }
                        } else if (line.startsWith('LOG:')) {
                            addLog(line.substring(4));
                        } else {
                            addLog(line);
                        }
                    } else if (parsed.type === 'error') {
                        addLog(parsed.line, true);
                    } else if (parsed.type === 'log') {
                        addLog(parsed.message);
                    }
                } catch(e) {
                    addLog(data, false);
                }
            }
        });

        launchBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const memory = memoryInput.value.trim();
            if (!username) {
                addLog('Kérlek add meg a felhasználónevet!', true);
                return;
            }
            if (!memory || !/^\d+[Gg]$/.test(memory)) {
                addLog('A memória formátuma: pl. 2G, 4G', true);
                return;
            }
            addLog('Indítás kérése elküldve...');
            setProgress(0);
            const message = {
                command: 'start',
                username: username,
                memory: memory.toUpperCase()
            };
            window.chrome.webview.postMessage(JSON.stringify(message));
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SUFNI ClIENT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            font-family: 'Segoe UI', 'IBM Plex Mono', 'Courier New', monospace;
            background: #0b041a;
            position: relative;
            color: #e2d9ff;
        }

        /* --- mélylila ipari háttér --- */
        .workshop-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 45%, #2a1548 0%, #0a031f 100%);
            z-index: 0;
        }
        .workshop-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(120, 70, 200, 0.08) 0px, rgba(120, 70, 200, 0.08) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(100, 60, 180, 0.05) 0px, rgba(100, 60, 180, 0.05) 1px, transparent 1px, transparent 6px);
            pointer-events: none;
        }
        .workshop-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 20%, rgba(139, 92, 246, 0.2), transparent 70%);
            pointer-events: none;
        }

        /* --- CRT utóhatás --- */
        .crt-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            box-shadow: inset 0 0 18px rgba(0,0,0,0.5), inset 0 0 2px rgba(168, 85, 247, 0.25);
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 3;
        }

        /* --- fő tartalom --- */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(10, 5, 25, 0.82);
            backdrop-filter: blur(2px);
        }

        /* --- fejléc (purple edge) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 28px 8px 28px;
            border-bottom: 1px solid #4a3a70;
        }
        .title h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #f0eaff;
            text-shadow: 0 1px 0 #a855f722;
            font-family: 'Segoe UI', 'Orbitron', monospace;
        }
        .title h1 span {
            color: #b77eff;
            font-weight: 700;
        }
        .badge {
            background: #1f1a30;
            padding: 4px 12px;
            border-radius: 32px;
            font-size: 10px;
            font-weight: 500;
            font-family: monospace;
            border-left: 3px solid #a855f7;
            letter-spacing: 0.5px;
            color: #cdbef5;
        }
        .version-tag {
            font-size: 11px;
            font-family: monospace;
            background: #1a142b;
            padding: 4px 12px;
            border-radius: 20px;
            color: #cbbaf0;
            border: 0.5px solid #5e4a8c;
        }

        /* --- progress bar (lila acél) --- */
        .progress-area {
            margin: 18px 28px 8px 28px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            margin-bottom: 6px;
            color: #b8a9f0;
            letter-spacing: 0.4px;
        }
        .progress-bar-container {
            background: #110c1c;
            border-radius: 2px;
            height: 8px;
            overflow: hidden;
            border: 0.5px solid #5a4790;
            box-shadow: inset 0 1px 3px #00000055;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b77eff, #a855f7);
            box-shadow: 0 0 6px #c084fc;
            transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* --- log terminál (purple gloomy) --- */
        .log-section {
            margin: 8px 28px 14px 28px;
            flex: 0 0 auto;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .log-header span {
            font-size: 11px;
            font-weight: 500;
            background: #1f1a30;
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 0.6px;
            color: #cfc2f5;
        }
        .clear-log {
            background: none;
            border: none;
            color: #9a88c5;
            font-family: monospace;
            font-size: 10px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 16px;
            transition: all 0.1s;
        }
        .clear-log:hover {
            background: #342a52;
            color: #d9c6ff;
        }
        .log-box {
            background: #09060f;
            border: 1px solid #41366b;
            border-radius: 6px;
            padding: 12px 12px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.45;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
        }
        .log-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
            color: #dbd0ff;
            border-left: 2px solid transparent;
            padding-left: 8px;
        }
        .log-error {
            color: #f0a6c9;
            border-left-color: #d946ef;
        }
        .log-success {
            color: #b9f5c0;
        }
        .log-info {
            color: #b7b0e6;
        }

        /* --- input mezők (purple industrial) --- */
        .controls {
            display: flex;
            gap: 20px;
            margin: 6px 28px 12px 28px;
        }
        .input-field {
            flex: 1;
        }
        .input-field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b6a4f0;
            margin-bottom: 6px;
        }
        .input-field input {
            width: 100%;
            background: #0e0920;
            border: 1px solid #5b4790;
            border-radius: 6px;
            padding: 8px 12px;
            color: #f2eaff;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: 0.1s linear;
        }
        .input-field input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 0 1px #b77eff66;
            background: #17112e;
        }

        /* --- indító gomb (purple edge) --- */
        .action {
            margin: 8px 28px 12px 28px;
            display: flex;
            justify-content: center;
        }
        .launch-btn {
            background: #1f1a33;
            border: 1px solid #a855f7;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #f0e9ff;
            width: 100%;
            max-width: 260px;
            transition: all 0.2s;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 1.5px;
            backdrop-filter: blur(2px);
        }
        .launch-btn:hover {
            background: #a855f7;
            border-color: #d6a9ff;
            color: #0c0a18;
            box-shadow: 0 0 12px #b77effaa;
        }
        .launch-btn:active {
            transform: scale(0.97);
        }
        .launch-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            background: #1f1a33;
            border-color: #5a4790;
        }

        .status-area {
            margin: 2px 28px 16px 28px;
            font-size: 10px;
            font-family: monospace;
            background: #110c1cbb;
            padding: 6px 12px;
            border-radius: 24px;
            text-align: center;
            color: #cbbef5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .led {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #554b7a;
            box-shadow: 0 0 2px currentColor;
        }
        .led.active {
            background: #c084fc;
            box-shadow: 0 0 6px #c084fc;
        }

        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-track {
            background: #1c1630;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #7c66b0;
            border-radius: 10px;
        }

        #dustCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
<div class="workshop-bg"></div>
<canvas id="dustCanvas"></canvas>
<div class="crt-glow"></div>
<div class="scanline"></div>

<div class="content">
    <div class="header">
        <div class="title">
            <h1>SUFNI <span>//</span> LAUNCHER</h1>
        </div>
            <div class="badge"> · fabric · </div>
        <div class="version-tag">v1.19.4-fabric</div>
    </div>

    <div class="progress-area">
        <div class="progress-label">
            <span>PROGRESS BAR</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <span>⎯ TERMINÁL ⎯</span>
            <button class="clear-log" id="clearLogBtn">⌧ törlés</button>
        </div>
        <div class="log-box" id="logBox">
        </div>
    </div>

    <div class="controls">
        <div class="input-field">
            <label>⌨️ név</label>
            <input type="text" id="username" spellcheck="false" autocomplete="off">
        </div>
        <div class="input-field">
            <label>🧠 memória (pl 2G / 4G)</label>
            <input type="text" id="memory" value="4G" spellcheck="false" autocomplete="off">
        </div>
    </div>

    <div class="action">
        <button class="launch-btn" id="launchBtn">⏣ INDÍTÁS ⏣</button>
    </div>

    <div class="status-area">
        <span class="led" id="statusLed"></span>
        <span id="statusText">● kész ●</span>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const launchBtn = document.getElementById('launchBtn');
        const usernameInput = document.getElementById('username');
        const memoryInput = document.getElementById('memory');
        const progressFill = document.getElementById('progressFill');
        const progressPercentSpan = document.getElementById('progressPercent');
        const logBox = document.getElementById('logBox');
        const statusTextSpan = document.getElementById('statusText');
        const statusLed = document.getElementById('statusLed');

        let isLaunching = false;
        let fakeSequenceTimer = null;
        let currentProgress = 0;
        let launchStartTime = null;

        // ----- local storage -----
        function loadStoredSettings() {
            const savedUser = localStorage.getItem('sufni_username');
            const savedMem = localStorage.getItem('sufni_memory');
            if (savedUser) usernameInput.value = savedUser;
            if (savedMem) memoryInput.value = savedMem;
        }
        function saveSettings() {
            localStorage.setItem('sufni_username', usernameInput.value.trim());
            localStorage.setItem('sufni_memory', memoryInput.value.trim());
        }

        // ----- log helper -----
        function addLog(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'log-line';
            if (type === 'error') line.classList.add('log-error');
            else if (type === 'success') line.classList.add('log-success');
            else if (type === 'info') line.classList.add('log-info');
            
            const timestamp = new Date().toLocaleTimeString('hu-HU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            line.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while(logBox.children.length > 220) logBox.removeChild(logBox.firstChild);
        }

        function clearLog() {
            while(logBox.firstChild) logBox.removeChild(logBox.firstChild);
            addLog('terminál törölve', 'info');
            addLog('sufni launcher újraindításra kész', 'info');
        }

        function setProgress(percent) {
            let p = Math.min(100, Math.max(0, Math.floor(percent)));
            currentProgress = p;
            progressFill.style.width = p + '%';
            progressPercentSpan.innerText = p + '%';
            if (p === 100) {
                statusTextSpan.innerText = '✓ kész ✓';
                statusLed.classList.add('active');
            } else {
                statusTextSpan.innerText = `⧗ folyamat: ${p}%`;
                if(p > 0 && p < 100) statusLed.classList.add('active');
                else if(p === 0) statusLed.classList.remove('active');
            }
        }

        function resetProgress() {
            setProgress(0);
        }

        // ----- szimuláció (offline / fallback) -----
        function simulateLaunch(username, memory) {
            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
            addLog(`⛏ indítás kérés: ${username} | ${memory} RAM`, 'info');
            setProgress(5);
            
            const steps = [
                { progress: 12, msg: '⎯ felhasználói profil ellenőrzése ...', delay: 380 },
                { progress: 25, msg: '⎯ könyvtárak feloldása (libraries)', delay: 420 },
                { progress: 40, msg: `⎯ memória foglalás: ${memory}`, delay: 300 },
                { progress: 55, msg: '⎯ natív modulok betöltése (fabric)', delay: 450 },
                { progress: 70, msg: '⎯ játékösszetevők integrálása', delay: 400 },
                { progress: 85, msg: '⎯ indítási hookok aktiválása', delay: 380 },
                { progress: 98, msg: '⎯ render előkészítés', delay: 350 }
            ];
            
            let stepIndex = 0;
            function runStep() {
                if (!isLaunching) return;
                if (stepIndex >= steps.length) {
                    setProgress(100);
                    addLog(`✔️ SUFNI elindult (${username} / ${memory})`, 'success');
                    addLog(`🌌  műhely mód: játék fut a háttérben`, 'info');
                    statusTextSpan.innerText = '✔️ fut ✔️';
                    statusLed.classList.add('active');
                    isLaunching = false;
                    launchBtn.disabled = false;
                    return;
                }
                const step = steps[stepIndex];
                setProgress(step.progress);
                addLog(step.msg, 'info');
                stepIndex++;
                fakeSequenceTimer = setTimeout(runStep, step.delay);
            }
            runStep();
        }

        // ----- webview2 kommunikáció -----
        function setupWebViewListener() {
            if (window.chrome?.webview) {
                window.chrome.webview.addEventListener('message', (event) => {
                    if (!isLaunching) return;
                    const raw = event.data;
                    try {
                        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
                        if (data.type === 'output') {
                            const line = data.line;
                            if (line && line.startsWith('PROGRESS:')) {
                                const perc = parseInt(line.split(':')[1]);
                                if (!isNaN(perc)) setProgress(perc);
                            } else if (line && line.startsWith('LOG:')) {
                                addLog(line.substring(4), 'info');
                            } else if (line) {
                                addLog(line, 'info');
                            }
                        } else if (data.type === 'error') {
                            addLog(data.line || data.message, 'error');
                        } else if (data.type === 'log') {
                            addLog(data.message, 'info');
                        }
                        if (data.type === 'done' || (data.progress && data.progress >= 100)) {
                            setProgress(100);
                            addLog(`✔️ Launcher sikeres (backend)`, 'success');
                            isLaunching = false;
                            launchBtn.disabled = false;
                            statusLed.classList.add('active');
                            statusTextSpan.innerText = '✔️ fut ✔️';
                            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
                        }
                    } catch(e) {
                        addLog(`üzenet feldolgozás hiba: ${raw}`, 'error');
                    }
                });
            }
        }

        // ----- indítás fő függvény -----
        function startLaunch() {
            if (isLaunching) {
                addLog('Már fut egy indítás, várj!', 'error');
                return;
            }
            const username = usernameInput.value.trim();
            let memory = memoryInput.value.trim().toUpperCase();
            if (!username) {
                addLog('❌ Név megadása kötelező', 'error');
                return;
            }
            if (!memory.match(/^\d+G$/)) {
                addLog('❌ Memória formátuma: szám + G (pl 2G, 4G)', 'error');
                return;
            }
            saveSettings();
            if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
            resetProgress();
            addLog(`🚀 INDÍTÁS: ${username} | memória: ${memory}`, 'info');
            isLaunching = true;
            launchBtn.disabled = true;
            statusLed.classList.remove('active');
            statusTextSpan.innerText = '⏳ indítás folyamatban';
            launchStartTime = Date.now();
            
            const hasWebView = !!(window.chrome && window.chrome.webview);
            if (hasWebView) {
                const message = {
                    command: 'start',
                    username: username,
                    memory: memory
                };
                window.chrome.webview.postMessage(JSON.stringify(message));
                // timeout 7 sec -> fallback ha nem jön válasz
                let fallbackTimer = setTimeout(() => {
                    if (isLaunching === true && currentProgress === 0) {
                        addLog('⚠️ WebView2 nem válaszol – átváltás szimulációs módra', 'error');
                        simulateLaunch(username, memory);
                        clearTimeout(fallbackTimer);
                    }
                }, 7000);
                const interval = setInterval(() => {
                    if (!isLaunching) {
                        clearInterval(interval);
                        clearTimeout(fallbackTimer);
                    }
                }, 300);
            } else {
                addLog('ℹ️ WebView2 nem elérhető – DEMO mód (szimuláció)', 'info');
                simulateLaunch(username, memory);
            }
        }

        // ----- vészhelyzeti feloldás -----
        function forceUnlock() {
            if (isLaunching) {
                if (fakeSequenceTimer) clearTimeout(fakeSequenceTimer);
                isLaunching = false;
                launchBtn.disabled = false;
                addLog('⛔ folyamat megszakítva (manuális)', 'error');
                setProgress(0);
                statusTextSpan.innerText = '● megszakítva ●';
                statusLed.classList.remove('active');
            }
        }

        // ----- időtúllépés ellenőrzés -----
        setInterval(() => {
            if (isLaunching && launchStartTime && (Date.now() - launchStartTime > 28000)) {
                addLog('⚠️ időtúllépés, indítás megszakítva', 'error');
                forceUnlock();
                setProgress(0);
            }
        }, 1000);

        // ----- részecskék (purple dust, nem AI slop) -----
        const canvas = document.getElementById('dustCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 120;

        function resizeCanvas() {
            canvas.width = 800;
            canvas.height = 600;
        }
        
        class DustParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.1;
                this.speedY = (Math.random() - 0.5) * 0.07;
                const purpleVal = 140 + Math.random() * 80;
                this.color = `rgba(${purpleVal + 40}, ${purpleVal - 30}, 240, ${Math.random() * 0.4 + 0.1})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < -15) this.x = canvas.width + 10;
                if (this.x > canvas.width + 15) this.x = -15;
                if (this.y < -15) this.y = canvas.height + 10;
                if (this.y > canvas.height + 15) this.y = -15;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new DustParticle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        initParticles();
        animate();
        window.addEventListener('resize', () => {
            if (canvas.width !== 800 || canvas.height !== 600) {
                resizeCanvas();
                initParticles();
            }
        });

        // ----- események -----
        launchBtn.addEventListener('click', startLaunch);
        document.getElementById('clearLogBtn').addEventListener('click', clearLog);
        
        [usernameInput, memoryInput].forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    startLaunch();
                }
            });
        });

        loadStoredSettings();
        setupWebViewListener();
        addLog('sufni launcher · lila ipari mód · kész', 'info');
        statusLed.classList.remove('active');
    })();
</script>
</body>
</html>
